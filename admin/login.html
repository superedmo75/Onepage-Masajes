<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenVibe | Iniciar Sesión Administrador</title>
  
  <!-- Font Awesome para Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts Outfit & Playfair Display -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap">
  
  <style>
    :root {
      --bg-color: #FDFBF7;
      --primary-color: #3D3534;
      --accent-gold: #B88E2F;
      --accent-gold-hover: #A07823;
      --text-muted: #6B5E5C;
      --border-color: #E8E2D9;
      --font-title: 'Playfair Display', Georgia, serif;
      --font-body: 'Outfit', sans-serif;
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-color);
      color: var(--primary-color);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Fondo decorativo zen */
    body::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(184, 142, 47, 0.08) 0%, rgba(253, 251, 247, 0) 70%);
      top: -100px;
      left: -100px;
      z-index: 1;
    }

    body::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(107, 124, 112, 0.06) 0%, rgba(253, 251, 247, 0) 70%);
      bottom: -150px;
      right: -150px;
      z-index: 1;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      padding: 50px 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 40px -10px rgba(61, 53, 52, 0.08);
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .logo-spa {
      font-family: var(--font-title);
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .logo-spa span {
      color: var(--accent-gold);
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 35px;
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 24px;
      text-align: left;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      opacity: 0.7;
    }

    .form-control {
      width: 100%;
      background: #FFF;
      border: 1px solid var(--border-color);
      padding: 14px 16px 14px 44px;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--primary-color);
      outline: none;
      transition: var(--transition-smooth);
    }

    .form-control:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 4px rgba(184, 142, 47, 0.08);
    }

    .btn-login {
      width: 100%;
      background-color: var(--accent-gold);
      color: #FFF;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-family: var(--font-body);
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.85rem;
      cursor: pointer;
      box-shadow: 0 10px 20px -10px rgba(184, 142, 47, 0.4);
      transition: var(--transition-smooth);
      margin-top: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .btn-login:hover {
      background-color: var(--accent-gold-hover);
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -10px rgba(184, 142, 47, 0.5);
    }

    .btn-login:disabled {
      background-color: #CCC;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      color: #C33;
      font-size: 0.85rem;
      margin-top: 15px;
      min-height: 20px;
      font-weight: 400;
      display: none;
    }

    .back-btn {
      display: inline-block;
      margin-top: 25px;
      font-size: 0.85rem;
      color: var(--text-muted);
      transition: var(--transition-smooth);
    }

    .back-btn:hover {
      color: var(--accent-gold);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-spa">Zen<span>Vibe</span></div>
    <p class="subtitle">Panel de Control de Administrador</p>
    
    <form id="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" id="username" class="form-control" placeholder="Nombre de usuario" required autocomplete="username">
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      
      <button type="submit" id="submit-btn" class="btn-login">
        <span>Ingresar</span> <i class="fa-solid fa-right-to-bracket"></i>
      </button>
      
      <div class="error-msg" id="error-msg"></div>
    </form>
    
    <a href="../" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Volver a la web</a>
  </div>

  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const submitBtn = document.getElementById("submit-btn");
      const errorMsg = document.getElementById("error-msg");
      
      // Bloquear botón y limpiar error
      submitBtn.disabled = true;
      submitBtn.querySelector("span").innerText = "Ingresando...";
      errorMsg.style.display = "none";
      
      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: usernameInput.value,
            password: passwordInput.value
          })
        });
        
        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.message || "Usuario o contraseña inválidos");
        }
        
        // Guardar sesión
        localStorage.setItem("adminToken", result.token);
        
        // Redirigir a la página principal con el modo de edición
        window.location.href = "../";
      } catch (err) {
        errorMsg.innerText = err.message;
        errorMsg.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.querySelector("span").innerText = "Ingresar";
      }
    });
  </script>
</body>
</html>
